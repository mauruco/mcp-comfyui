services:
  mcp-comfyui:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8189:8189"
    environment:
      - NODE_ENV=production
      - COMFYUI_HOST=127.0.0.1
      - COMFYUI_PORT=8188
      - MCP_SERVER_PORT=8189
      - MCP_LOG_FILE=/app/logs/mcp-comfyui.log
      - MCP_DEBUG=false
      - COMFYUI_OUTPUT_FOLDER=/app/output
    volumes:
      - ./output:/app/output
      - ./output-dest:/app/output-dest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8189/mcp"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    network_mode: "host"
    # networks:
    #   - mcp-network

